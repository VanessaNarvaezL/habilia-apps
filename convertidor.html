<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertidor habilia</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,Segoe UI,Roboto,sans-serif; }
  body {
    background:#0e1a0f; color:#f2ede4; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px; text-align:center;
  }
  h1 { font-family:Georgia,serif; font-size:1.4rem; margin-bottom:6px; color:#e8c96a; }
  p.sub { color:#8a9e8c; font-size:0.85rem; margin-bottom:24px; max-width:380px; }

  #drop {
    width:100%; max-width:380px; border:2px dashed #4a7c4e;
    border-radius:14px; padding:32px 16px; cursor:pointer;
    background:#152018;
  }
  #drop p { color:#a8e6ac; font-size:0.95rem; }
  input[type=file] { display:none; }

  #status { margin-top:18px; font-size:0.9rem; color:#c9a84c; min-height:24px; }

  #preview {
    width:100%; max-width:280px; margin-top:18px;
    border-radius:10px; display:none; background:#000; max-height:50vh;
  }

  #convert-btn, #download {
    display:none; margin-top:18px; padding:13px 28px;
    background:#c9a84c; color:#0e1a0f; border:none;
    border-radius:8px; font-weight:700; font-size:0.95rem;
    cursor:pointer; text-decoration:none; width:100%; max-width:280px;
  }
  #download { background:#7ec882; }

  .progress-bar {
    width:100%; max-width:380px; height:6px; background:#2d4a2f;
    border-radius:4px; margin-top:14px; overflow:hidden; display:none;
  }
  .progress-fill { height:100%; background:#c9a84c; width:0%; transition:width 0.2s; }

  .note { color:#5a7a5e; font-size:0.75rem; margin-top:14px; max-width:340px; }
</style>
</head>
<body>

<h1>Convertidor habilia</h1>
<p class="sub">Convierte tus videos a vertical 9:16, listos para CapCut y reels</p>

<div id="drop" onclick="document.getElementById('file').click()">
  <p>📹 Toca aquí para elegir tu video</p>
</div>
<input type="file" id="file" accept="video/*">

<video id="preview" controls playsinline></video>

<button id="convert-btn" onclick="startConvert()">🔄 Convertir a vertical 9:16</button>

<div class="progress-bar" id="bar"><div class="progress-fill" id="fill"></div></div>
<div id="status"></div>
<a id="download" download="habilia-reel.webm">⬇ Descargar video</a>

<p class="note">Si el video sale muy pesado o tarda mucho, prueba con clips más cortos (uno por frase) — es más fácil de procesar y luego los unes en CapCut.</p>

<script>
const fileInput = document.getElementById('file');
const drop = document.getElementById('drop');
const preview = document.getElementById('preview');
const statusEl = document.getElementById('status');
const downloadBtn = document.getElementById('download');
const convertBtn = document.getElementById('convert-btn');
const bar = document.getElementById('bar');
const fill = document.getElementById('fill');

let selectedFile = null;

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  convertBtn.style.display = 'block';
  downloadBtn.style.display = 'none';
  statusEl.textContent = '';
  bar.style.display = 'none';
  fill.style.width = '0%';
}

async function startConvert() {
  convertBtn.disabled = true;
  convertBtn.textContent = 'Procesando...';
  statusEl.textContent = 'Cargando video...';
  bar.style.display = 'block';
  fill.style.width = '5%';

  try {
    await convert(selectedFile);
  } catch(err) {
    statusEl.textContent = '⚠️ Error: ' + err.message + '. Prueba con un clip más corto.';
  }

  convertBtn.disabled = false;
  convertBtn.textContent = '🔄 Convertir a vertical 9:16';
}

function convert(file) {
  return new Promise((resolve, reject) => {
    const videoEl = document.createElement('video');
    videoEl.src = URL.createObjectURL(file);
    videoEl.muted = false;
    videoEl.playsInline = true;

    videoEl.onloadedmetadata = async () => {
      const srcW = videoEl.videoWidth;
      const srcH = videoEl.videoHeight;

      // Salida vertical 9:16, tamaño moderado para no saturar memoria
      const outW = 720;
      const outH = 1280;

      const canvas = document.createElement('canvas');
      canvas.width = outW;
      canvas.height = outH;
      const ctx = canvas.getContext('2d', { alpha:false });

      function drawFrame() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0,0,outW,outH);
        const srcRatio = srcW / srcH;
        const outRatio = outW / outH;
        let dw, dh, dx, dy;
        if (srcRatio > outRatio) {
          dh = outH; dw = outH * srcRatio;
          dx = (outW - dw) / 2; dy = 0;
        } else {
          dw = outW; dh = outW / srcRatio;
          dx = 0; dy = (outH - dh) / 2;
        }
        ctx.drawImage(videoEl, dx, dy, dw, dh);
      }

      const canvasStream = canvas.captureStream(30);

      // Audio
      try {
        const audioCtx = new AudioContext();
        const src = audioCtx.createMediaElementSource(videoEl);
        const dest = audioCtx.createMediaStreamDestination();
        src.connect(dest);
        const at = dest.stream.getAudioTracks()[0];
        if (at) canvasStream.addTrack(at);
      } catch(e) { console.warn('audio', e); }

      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
        ? 'video/webm;codecs=vp8,opus'
        : 'video/webm';

      const recorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 4_000_000 });
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size>0) chunks.push(e.data); };

      recorder.onstop = () => {
        fill.style.width = '100%';
        const blob = new Blob(chunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        downloadBtn.href = url;
        downloadBtn.download = 'habilia-reel.webm';
        downloadBtn.style.display = 'block';
        statusEl.textContent = '✅ Listo — descarga tu video vertical';
        resolve();
      };

      videoEl.currentTime = 0;
      recorder.start(200);
      videoEl.muted = false;
      videoEl.volume = 1;

      let raf;
      function loop() {
        if (videoEl.ended || videoEl.paused) return;
        drawFrame();
        fill.style.width = Math.min(95, (videoEl.currentTime / videoEl.duration) * 100) + '%';
        raf = requestAnimationFrame(loop);
      }

      videoEl.onplay = () => { statusEl.textContent = 'Convirtiendo...'; loop(); };
      videoEl.onended = () => { recorder.stop(); };
      videoEl.onerror = () => reject(new Error('No se pudo leer el video'));

      try {
        await videoEl.play();
      } catch(e) {
        reject(new Error('No se pudo reproducir el video para procesarlo'));
      }
    };

    videoEl.onerror = () => reject(new Error('Formato de video no soportado'));
  });
}
</script>
</body>
</html>
