<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="screen-orientation" content="portrait">
<title>Teleprompter habilia</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000;
  overflow-x:hidden; color:#fff; font-family:Georgia,serif; overflow:hidden; height:100vh; touch-action:none; }

  #controls {
    position:fixed; top:0; left:0; right:0; z-index:200;
    background:rgba(0,0,0,0.92); padding:8px 10px;
    display:flex; gap:6px; align-items:center; flex-wrap:wrap;
    border-bottom:1px solid #222;
  }

  select#reel-select {
    flex:1; min-width:0; padding:7px 8px;
    background:#1a1a1a; color:#fff; border:1px solid #444;
    border-radius:6px; font-size:0.78rem; cursor:pointer;
  }

  .btn {
    padding:8px 12px; border:none; border-radius:6px;
    font-size:0.8rem; font-weight:700; cursor:pointer;
    white-space:nowrap; flex-shrink:0;
  }
  #btn-rec   { background:#c9a84c; color:#000; }
  #btn-rec.recording { background:#e53e3e; color:#fff; animation:pulse 1s infinite; }
  #btn-pause { background:#333; color:#fff; }
  #btn-reset { background:#1a1a1a; color:#c9a84c; border:1px solid #c9a84c; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  .row2 {
    width:100%; display:flex; gap:6px; align-items:center;
    padding-top:4px;
  }
  .lbl { color:#888; font-size:0.72rem; white-space:nowrap; }
  input[type=range] { flex:1; accent-color:#c9a84c; height:4px; }

  /* Cámara de fondo */
  #cam-bg {
    position:fixed; top:0; left:0; right:0; bottom:0; z-index:0;
    background:#000;
  }
  #cam-bg video {
    width:100%; height:100%; object-fit:cover;
    transform:scaleX(-1); /* espejo */
  }
  #cam-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.52); z-index:1;
  }

  /* Scroll de texto */
  #scroll-wrap {
    position:fixed; top:0; left:0; right:0; bottom:0;
    overflow:hidden; z-index:10;
  }
  #text-block {
    padding:55vh 6% 60vh;
    font-size:2.2rem; line-height:1.8;
    text-align:center; color:#fff;
    text-shadow:0 2px 12px rgba(0,0,0,0.95), 0 0 30px rgba(0,0,0,0.8);
    font-weight:600;
    will-change:transform;
  }

  .pm  { color:#c9a84c; font-size:1.3rem; margin:0 4px; opacity:0.75; }
  .hl  { color:#f0d878; font-style:italic; }

  /* Línea de lectura */
  #line {
    position:fixed; top:50%; left:4%; right:4%; height:2px;
    background:rgba(201,168,76,0.35); z-index:20; border-radius:2px;
    pointer-events:none;
  }

  /* Fade top/bottom */
  #ft {
    position:fixed; top:0; left:0; right:0; height:90px;
    background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
    z-index:15; pointer-events:none;
  }
  #fb {
    position:fixed; bottom:0; left:0; right:0; height:110px;
    background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
    z-index:15; pointer-events:none;
  }

  /* REC badge */
  #rec-badge {
    position:fixed; top:8px; right:10px; z-index:300;
    background:#e53e3e; color:#fff; font-size:0.7rem; font-weight:700;
    padding:3px 8px; border-radius:20px; display:none;
    animation:pulse 1s infinite;
  }

  /* Controles ocultos mientras graba */
  #controls.hidden { opacity:0; pointer-events:none; transition:opacity 0.4s; }
  #controls { transition:opacity 0.4s; }

  /* Botón mostrar controles mientras graba */
  #show-ctrl {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    z-index:300; background:rgba(0,0,0,0.7); color:#c9a84c;
    border:1px solid #c9a84c; border-radius:20px;
    padding:6px 18px; font-size:0.78rem; cursor:pointer;
    display:none;
  }
</style>
</head>
<body>

<div id="cam-bg"><video id="video" autoplay playsinline muted></video></div>
<div id="cam-overlay"></div>

<div id="ft"></div>
<div id="line"></div>
<div id="scroll-wrap"><div id="text-block"></div></div>
<div id="fb"></div>

<div id="rec-badge">● REC</div>
<button id="show-ctrl" onclick="showControls()">Mostrar controles</button>

<div id="controls">
  <select id="reel-select" onchange="loadReel()">
    <option value="r1">Reel 1 — Presentación</option>
    <option value="r2" selected>Reel 2 — Qué hace habilia</option>
    <option value="r3">Reel 3 — Por qué el precio</option>
    <option value="r4">Reel 4 — El problema no es el dinero</option>
    <option value="r5">Reel 5 — Tomo 1 de trading</option>
  </select>
  <button class="btn" id="btn-rec" onclick="toggleRec()">⏺ Grabar</button>
  <button class="btn" id="btn-pause" onclick="togglePause()">⏸ Pausa</button>
  <button class="btn" id="btn-reset" onclick="resetAll()">↺</button>
  <div class="row2">
    <span class="lbl">🐢</span>
    <input type="range" id="spd" min="0.2" max="3" step="0.05" value="0.9" oninput="updateSpeed()">
    <span class="lbl">🐇 <span id="spd-val">0.9x</span></span>
    <span class="lbl" style="margin-left:8px">A</span>
    <input type="range" id="fsz" min="1.2" max="3.8" step="0.1" value="2.2" oninput="updateFont()">
    <span class="lbl">A</span>
  </div>
</div>

<script>
const REELS = {
r1:`Si alguna vez sentiste que mereces más
de lo que la vida te ha dado hasta ahora <span class="pm">—</span>

este espacio es para ti.

<span class="pm">...</span>

Me llamo Vanessa, soy parte del equipo de habilia <span class="pm">—</span>

una plataforma chilena que nació con una sola idea:

<span class="hl">darte herramientas reales para que crezcas de verdad.</span>

No teoría bonita. No motivación vacía.

Cosas que puedes aplicar desde hoy.

<span class="pm">...</span>

Tenemos apps, ebooks sobre finanzas y alimentación,

y mucho más que viene en camino.

Todo creado para personas con hambre de avanzar <span class="pm">—</span>

aunque por ahora el bolsillo esté apretado.

<span class="pm">...</span>

Porque creemos que el conocimiento que te cambia la vida

no debería estar reservado para los que ya llegaron.

<span class="pm">...</span>

<span class="hl">Bienvenida, bienvenido. Esto recién empieza.</span>`,

r2:`habilia es una plataforma chilena de aprendizaje digital.

Pero no del tipo que te vende un curso de 200 mil pesos

y te deja solo con un PDF.

<span class="pm">...</span>

Tenemos apps interactivas, ebooks prácticos

y herramientas reales <span class="pm">—</span>

sobre finanzas, trading, bienestar

y mucho más que viene en camino.

<span class="pm">...</span>

Todo pensado para personas que quieren crecer de verdad <span class="pm">—</span>

no para los que ya llegaron.

Por eso nuestros precios son accesibles desde el primer día.

<span class="pm">...</span>

Porque creemos que el conocimiento que te cambia la perspectiva

<span class="hl">no debería tener precio de entrada.</span>

<span class="pm">...</span>

El link está en el perfil.

Entra, mira, y si algo te sirve <span class="pm">—</span>

<span class="hl">es tuyo.</span>`,

r3:`¿Sabías que la mayoría de los cursos de inversión

cuestan entre 200 mil y un millón de pesos?

<span class="pm">...</span>

Y el contenido muchas veces es el mismo

que puedes encontrar gratis en internet.

<span class="pm">...</span>

El precio alto no garantiza mejor conocimiento.

<span class="hl">Garantiza mejor marketing.</span>

<span class="pm">...</span>

En habilia decidimos hacer lo contrario.

Precios reales, para personas reales <span class="pm">—</span>

porque el conocimiento que te cambia la perspectiva

no debería costar lo que no tienes.

<span class="pm">...</span>

Ebooks desde $2.990.

Apps con acceso de por vida desde $3.990.

<span class="pm">...</span>

<span class="hl">Premium no significa caro.
Significa que no te va a decepcionar.</span>`,

r4:`El problema no es que no tienes dinero.

<span class="hl">El problema es la relación que tienes con él.</span>

<span class="pm">...</span>

Porque la mayoría de nosotros creció escuchando

que el dinero es difícil, que no alcanza, que es para otros.

Y eso se queda grabado más profundo de lo que creemos.

<span class="pm">...</span>

No es falta de esfuerzo.

Es que nadie nos enseñó a pensar diferente sobre la plata.

<span class="pm">...</span>

Eso es exactamente lo que hacemos en habilia.

No solo te enseñamos herramientas financieras <span class="pm">—</span>

te ayudamos a cambiar la forma en que piensas sobre el dinero.

<span class="pm">...</span>

Porque antes de invertir un peso,

tienes que entender qué sientes cuando lo tienes

y qué sientes cuando no lo tienes.

<span class="pm">...</span>

<span class="hl">El link está en el perfil.</span>`,

r5:`¿Sabías que el 90% de las personas que empiezan a hacer trading

pierden dinero en los primeros 6 meses?

<span class="pm">...</span>

No es porque sean malos.

Es porque nadie les explicó

cómo piensan realmente los mercados.

<span class="pm">...</span>

El mercado no se mueve al azar.

Se mueve con lógica institucional <span class="pm">—</span>

y cuando entiendes esa lógica,

empiezas a ver cosas que antes eran invisibles.

<span class="pm">...</span>

Eso es exactamente lo que enseña el Tomo 1 de trading de habilia.

Cómo piensan los grandes jugadores del mercado <span class="pm">—</span>

y por qué el trader principiante casi siempre cae en sus trampas.

<span class="pm">...</span>

Vale $2.990. Menos que un almuerzo.

<span class="hl">El link está en el perfil.</span>`
};

// ── Estado ──
let y = 0, spd = 0.9, raf = null, paused = false;
let mediaRecorder = null, chunks = [], recording = false;
let camStream = null;

// ── Cámara ──
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:1080}, height:{ideal:1920} },
      audio:true
    });
    document.getElementById('video').srcObject = camStream;
  } catch(e) {
    console.warn('Cámara no disponible:', e);
  }
}

// ── Texto ──
function loadReel() {
  const k = document.getElementById('reel-select').value;
  document.getElementById('text-block').innerHTML = REELS[k];
  resetAll();
}

// ── Scroll ──
function tick() {
  if (!paused) {
    y += spd;
    document.getElementById('text-block').style.transform = `translateY(-${y}px)`;
  }
  raf = requestAnimationFrame(tick);
}

function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶ Continuar' : '⏸ Pausa';
}

function resetAll() {
  paused = true;
  y = 0;
  document.getElementById('text-block').style.transform = 'translateY(0)';
  document.getElementById('btn-pause').textContent = '⏸ Pausa';
  if (!recording) paused = false;
}

function updateSpeed() {
  spd = parseFloat(document.getElementById('spd').value);
  document.getElementById('spd-val').textContent = spd.toFixed(1) + 'x';
}

function updateFont() {
  const v = document.getElementById('fsz').value;
  document.getElementById('text-block').style.fontSize = v + 'rem';
}

// ── Grabación ──
async function toggleRec() {
  if (!recording) {
    // Iniciar
    if (!camStream) { alert('La cámara no está disponible.'); return; }
    chunks = [];
    // Combinar cámara + audio
    const stream = new MediaStream([
      ...camStream.getVideoTracks(),
      ...camStream.getAudioTracks()
    ]);
    const opts = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
      ? { mimeType:'video/webm;codecs=vp9,opus' }
      : MediaRecorder.isTypeSupported('video/webm')
      ? { mimeType:'video/webm' } : {};
    mediaRecorder = new MediaRecorder(stream, opts);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    mediaRecorder.onstop = saveVideo;
    mediaRecorder.start(100);
    recording = true;
    paused = false;
    // UI
    document.getElementById('btn-rec').textContent = '⏹ Detener y guardar';
    document.getElementById('btn-rec').classList.add('recording');
    document.getElementById('rec-badge').style.display = 'block';
    document.getElementById('controls').classList.add('hidden');
    document.getElementById('show-ctrl').style.display = 'block';
  } else {
    // Detener
    mediaRecorder.stop();
    recording = false;
    paused = true;
    document.getElementById('btn-rec').textContent = '⏺ Grabar';
    document.getElementById('btn-rec').classList.remove('recording');
    document.getElementById('rec-badge').style.display = 'none';
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('show-ctrl').style.display = 'none';
  }
}

function saveVideo() {
  const blob = new Blob(chunks, { type: chunks[0]?.type || 'video/webm' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const reel = document.getElementById('reel-select').options[document.getElementById('reel-select').selectedIndex].text;
  a.href     = url;
  a.download = `habilia-${reel.replace(/[^a-z0-9]/gi,'_')}.webm`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function showControls() {
  document.getElementById('controls').classList.remove('hidden');
}

// ── Forzar orientación vertical ──
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('portrait').catch(() => {});
}

// ── Init ──
loadReel();
startCam();
requestAnimationFrame(tick);
</script>
</body>
</html>
